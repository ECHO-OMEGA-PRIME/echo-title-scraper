name = "echo-title-scraper"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[vars]
WORKER_VERSION = "1.0.0"
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "echo-title-scraper"
database_id = "24eb83d3-9387-4724-b32a-2214d5681b30"

[[kv_namespaces]]
binding = "TITLE_CACHE"
id = "96a53eac9c8244d789b1b04d7ac2deae"

[[r2_buckets]]
binding = "RECORDS"
bucket_name = "echo-prime-records"

[[services]]
binding = "SHADOWGLASS"
service = "shadowglass-v8-warpspeed"

[[services]]
binding = "BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "AI_ORCHESTRATOR"
service = "echo-ai-orchestrator"

[ai]
binding = "AI"

[triggers]
crons = ["0 4 * * *"]
